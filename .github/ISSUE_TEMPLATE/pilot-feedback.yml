name: Pilot Feedback (Content Issue)
description: Report a specific content issue found while teaching this lesson as a pilot
title: "[Pilot Feedback]: <brief description>"
labels: ["pilot-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report a specific issue you found while piloting this lesson.
        For your full post-workshop report (timing, overall feedback, blog acknowledgment),
        please also file a [Pilot Report](https://github.com/ucla-imls-open-sci/ucla-imls-open-sci.github.io/issues/new?template=pilot-report.yml) in the central project repo.

  - type: input
    id: name
    attributes:
      label: Your name and institution
      placeholder: Jane Doe, University Library
    validations:
      required: true

  - type: input
    id: episode
    attributes:
      label: Episode or section
      description: Where in the lesson did this issue occur?
      placeholder: "Episode 2: Working with Data"
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Type of issue
      options:
        - Content error or inaccuracy
        - Unclear instruction or explanation
        - Exercise problem (broken, ambiguous, too hard, too easy)
        - Timing estimate is off
        - Missing instructor note
        - Broken link or image
        - Accessibility issue
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the issue? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: Optional — what would you change?
    validations:
      required: false

  - type: input
    id: pilot_report
    attributes:
      label: Link to your Pilot Report
      description: Optional — paste the URL of your full pilot report issue if you've filed one
      placeholder: https://github.com/ucla-imls-open-sci/ucla-imls-open-sci.github.io/issues/...
    validations:
      required: false
